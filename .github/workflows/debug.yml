name: Debug Proxy
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Test proxy services
        run: |
          UA='Mozilla/5.0'
          TARGET='https://namu.wiki/w/%EB%A1%9C%EB%98%90%206/45/%EB%8B%B9%EC%B2%A8%EB%B2%88%ED%98%B8/2020%EB%85%84%EB%8C%80'
          TARGET_ENC=$(printf '%s' "$TARGET" | python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.stdin.read(), safe=''))")

          echo "=== 1) allorigins.win get ==="
          curl -sL -A "$UA" --max-time 30 "https://api.allorigins.win/raw?url=$TARGET_ENC" -o /tmp/a.html
          wc -c /tmp/a.html
          grep -oE '1223|1224|2026-05' /tmp/a.html | head -5

          echo "=== 2) corsproxy.io ==="
          curl -sL -A "$UA" --max-time 30 "https://corsproxy.io/?$TARGET_ENC" -o /tmp/b.html
          wc -c /tmp/b.html
          grep -oE '1223|1224|2026-05' /tmp/b.html | head -5

          echo "=== 3) jina reader (r.jina.ai) ==="
          curl -sL -A "$UA" --max-time 30 "https://r.jina.ai/$TARGET" -o /tmp/c.txt
          wc -c /tmp/c.txt
          grep -oE '1223|1224|2026.05' /tmp/c.txt | head -5

          echo "=== 4) google cache (deprecated) ==="
          curl -sI -A "$UA" --max-time 15 "https://webcache.googleusercontent.com/search?q=cache:$TARGET" | head -3

          echo "=== 5) crossorigin.me alternative ==="
          curl -sL -A "$UA" --max-time 30 "https://cors-anywhere.herokuapp.com/$TARGET" -o /tmp/d.html
          wc -c /tmp/d.html
          head -c 200 /tmp/d.html
