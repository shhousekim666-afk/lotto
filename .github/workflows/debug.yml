name: Debug Jina
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect jina reader
        run: |
          TARGET='https://namu.wiki/w/%EB%A1%9C%EB%98%90%206/45/%EB%8B%B9%EC%B2%A8%EB%B2%88%ED%98%B8/2020%EB%85%84%EB%8C%80'

          echo "=== 1) jina default ==="
          curl -sL --max-time 60 "https://r.jina.ai/$TARGET" -o /tmp/c1.txt
          wc -c /tmp/c1.txt
          head -c 1000 /tmp/c1.txt
          echo
          echo "..."
          tail -c 500 /tmp/c1.txt
          echo
          echo "=== 2) jina with X-Return-Format ==="
          curl -sL --max-time 60 -H "X-Return-Format: html" "https://r.jina.ai/$TARGET" -o /tmp/c2.txt
          wc -c /tmp/c2.txt
          grep -oE '1223|1224|2026-05|2026\.05' /tmp/c2.txt | head -5

          echo "=== 3) jina with engine browser ==="
          curl -sL --max-time 60 -H "X-Engine: browser" "https://r.jina.ai/$TARGET" -o /tmp/c3.txt
          wc -c /tmp/c3.txt
          grep -oE '1223|1224|2026' /tmp/c3.txt | head -5

          echo "=== 4) jina POST ==="
          curl -sL --max-time 60 -X POST "https://r.jina.ai/" -H "Content-Type: application/json" -d "{\"url\":\"$TARGET\"}" -o /tmp/c4.txt
          wc -c /tmp/c4.txt
          head -c 500 /tmp/c4.txt
