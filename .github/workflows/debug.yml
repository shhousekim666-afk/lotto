name: Debug Lotto API
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Test direct curl
        run: |
          echo "=== with -L ==="
          curl -sL -A "Mozilla/5.0" --max-time 15 "https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=1223" | head -c 500
          echo
          echo "=== without -L ==="
          curl -s -A "Mozilla/5.0" --max-time 15 "https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=1223" | head -c 500
          echo
          echo "=== headers ==="
          curl -sI -A "Mozilla/5.0" --max-time 15 "https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=1223"
          echo
          echo "=== 1222 (known good) ==="
          curl -sL -A "Mozilla/5.0" --max-time 15 "https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=1222" | head -c 300
