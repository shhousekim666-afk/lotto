name: Add Lotto Round (manual)

on:
  workflow_dispatch:
    inputs:
      data:
        description: "회차,YYYY-MM-DD,n1,n2,n3,n4,n5,n6,보너스 (예: 1225,2026-05-23,1,2,3,4,5,6,7)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Add round
        run: python add_round.py "${{ inputs.data }}"

      - name: Commit and push
        run: |
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "data: ${{ inputs.data }} 수동 추가"
            git push
          else
            echo "변경 없음"
          fi
