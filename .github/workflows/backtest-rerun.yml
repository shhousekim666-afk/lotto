name: Re-run Backtest (manual)

on:
  workflow_dispatch:
    inputs:
      monte_sims:
        description: "monte 시뮬 수 (기본 10000, 빠르게 하려면 5000)"
        required: false
        default: "10000"
        type: string
      rand_runs:
        description: "rand 알고리즘 회차당 반복 수 (기본 100)"
        required: false
        default: "100"
        type: string
      run_sweep:
        description: "하이퍼파라미터 sweep 같이 실행"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  rerun:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine last round
        id: lastround
        run: |
          LAST=$(node -e "import('./backtest/data-loader.js').then(({loadDraws})=>{const d=loadDraws();console.log(d[d.length-1].no)})")
          echo "last=$LAST" >> $GITHUB_OUTPUT
          echo "마지막 회차: $LAST"

      - name: Run full backtest
        run: |
          node backtest/runner.js \
            --start 301 --end ${{ steps.lastround.outputs.last }} \
            --step 1 --rand ${{ inputs.rand_runs }} --monte-sims ${{ inputs.monte_sims }} \
            --out-summary backtest/backtest-summary.json \
            --out-detail backtest/backtest-detail.json

      - name: Measure fidelity
        run: node backtest/measure-fidelity.js

      - name: Measure stability (recent 10 weeks)
        run: node backtest/stability.js

      - name: Run sweep
        if: ${{ inputs.run_sweep }}
        run: node backtest/sweep.js

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "=== 산출물 파일 ==="
          ls -la backtest/*.json
          echo "=== git status (커밋 전) ==="
          git status --short
          for f in backtest/backtest-summary.json backtest/fidelity-summary.json backtest/stability-summary.json backtest/sweep-summary.json; do
            if [[ -f "$f" ]]; then
              git add "$f"
              echo "add: $f"
            else
              echo "::warning::파일 없음: $f"
            fi
          done
          echo "=== git status (add 후) ==="
          git status --short
          if [[ -z "$(git diff --cached --name-only)" ]]; then
            echo "::warning::staged 변경 없음 — 커밋 스킵"
            exit 0
          fi
          LAST_ROUND=${{ steps.lastround.outputs.last }}
          git commit -m "backtest: ${LAST_ROUND}회까지 전체 재계산 (자동)"
          git push
          echo "✓ 푸시 완료"
